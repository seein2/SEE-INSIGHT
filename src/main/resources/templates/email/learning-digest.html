<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<body style="margin:0;padding:0;background:#f6f0e8;font-family:Pretendard,'Apple SD Gothic Neo','Noto Sans KR',sans-serif;color:#1f2a32;">
<div style="max-width:640px;margin:0 auto;padding:28px 20px;">
    <div style="background:#ffffff;border:1px solid #e4d8ca;border-radius:24px;overflow:hidden;box-shadow:0 18px 40px rgba(35,39,42,0.08);">
        <div style="padding:28px;background:linear-gradient(135deg,#f4e1c8,#dce9f1);">
            <p style="margin:0 0 8px;font-size:12px;font-weight:800;letter-spacing:0.14em;text-transform:uppercase;color:#73553b;">SEE-INSIGHT</p>
            <h1 style="margin:0;font-size:28px;line-height:1.2;" th:text="${subscription.studyLanguageLabel + ' · ' + subscription.learningStyleLabel}">영어 · 실전 읽기</h1>
            <p style="margin:10px 0 0;font-size:15px;color:#4d5a63;" th:text="${subscription.scheduleLabel + ' 학습 메일'}">매일 08:00 학습 메일</p>
        </div>

        <div style="padding:28px;">
            <p style="margin:0 0 10px;font-size:13px;font-weight:700;color:#8a6a4f;">오늘의 학습 카드</p>
            <h2 style="margin:0 0 14px;font-size:24px;line-height:1.3;" th:text="${content.title}">오늘의 문장</h2>
            <p style="margin:0 0 18px;font-size:16px;line-height:1.6;color:#44525d;" th:text="${content.summary}">요약</p>

            <div style="padding:18px;border-radius:18px;background:#f7fafc;border:1px solid #d7e4ed;">
                <p style="margin:0 0 10px;font-size:13px;font-weight:700;color:#6a7c89;">원문</p>
                <p style="margin:0;font-size:17px;line-height:1.7;" th:text="${content.sourceText}">원문 텍스트</p>
            </div>

            <div style="margin-top:18px;">
                <p style="margin:0 0 10px;font-size:13px;font-weight:700;color:#8a6a4f;">해설</p>
                <p style="margin:0;font-size:15px;line-height:1.7;color:#44525d;" th:text="${content.explanationText}">해설</p>
            </div>

            <div style="margin-top:20px;padding:18px;border-radius:18px;background:#fff7ef;border:1px solid #efd6bc;">
                <p style="margin:0 0 10px;font-size:13px;font-weight:700;color:#8a6a4f;">핵심 표현</p>
                <ul style="margin:0;padding-left:18px;color:#44525d;line-height:1.8;">
                    <li th:text="${content.expressionOne}">표현 1</li>
                    <li th:text="${content.expressionTwo}">표현 2</li>
                </ul>
            </div>

            <div style="margin-top:20px;">
                <p style="margin:0 0 10px;font-size:13px;font-weight:700;color:#8a6a4f;">짧은 복습 문제</p>
                <p style="margin:0;font-size:15px;line-height:1.7;color:#44525d;" th:text="${content.quizText}">질문</p>
            </div>

            <div style="margin-top:24px;">
                <a th:if="${content.sourceLink != null}"
                   th:href="${content.sourceLink}"
                   style="display:inline-flex;padding:12px 18px;border-radius:999px;background:#21333f;color:#ffffff;text-decoration:none;font-weight:700;">
                    원문 보기
                </a>
            </div>
        </div>
    </div>
</div>
</body>
</html>

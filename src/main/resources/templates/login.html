<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SEE-INSIGHT | 로그인</title>
    <link rel="stylesheet" th:href="@{/css/app.css}">
</head>
<body>
<main class="auth-shell">
    <section class="auth-card">
        <p class="eyebrow">Learning Starts Here</p>
        <h1>읽고, 이해하고, 메일로 이어가는 학습 루틴</h1>
        <p class="auth-description">
            홈에서 본 학습 스타일을 그대로 이메일 구독까지 연결할 수 있습니다.
            로그인 후 바로 나만의 학습 피드를 설정해 보세요.
        </p>

        <div class="auth-actions">
            <a class="auth-button google" th:href="${googleLoginUrl}">구글로 시작하기</a>
            <a class="auth-button naver" th:href="${naverLoginUrl}">네이버로 시작하기</a>
        </div>

        <a class="text-link" th:href="@{/}">홈으로 돌아가기</a>
    </section>
</main>
</body>
</html>

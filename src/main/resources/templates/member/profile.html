<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>내 정보</title>
    <style>
        :root {
            color-scheme: light;
            --bg-start: #f4efe3;
            --bg-end: #d8e7ef;
            --panel: rgba(255, 255, 255, 0.88);
            --text: #18242d;
            --muted: #61707b;
            --border: rgba(24, 36, 45, 0.1);
            --accent: #d96f32;
        }

        * {
            box-sizing: border-box;
        }

        body {
            margin: 0;
            min-height: 100vh;
            font-family: "Pretendard", "Apple SD Gothic Neo", "Noto Sans KR", sans-serif;
            color: var(--text);
            background:
                radial-gradient(circle at top, rgba(255, 255, 255, 0.7), transparent 36%),
                linear-gradient(135deg, var(--bg-start), var(--bg-end));
            padding: 24px;
        }

        .page {
            width: min(760px, 100%);
            margin: 0 auto;
        }

        .topbar {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 22px;
        }

        .brand {
            display: inline-flex;
            align-items: center;
            gap: 12px;
            font-size: 15px;
            font-weight: 800;
            letter-spacing: 0.08em;
            text-transform: uppercase;
        }

        .brand::before {
            content: "";
            width: 14px;
            height: 14px;
            border-radius: 50%;
            background: linear-gradient(135deg, var(--accent), #f2bb67);
            box-shadow: 0 0 0 8px rgba(217, 111, 50, 0.08);
        }

        .link-button {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            min-height: 42px;
            padding: 0 18px;
            border-radius: 999px;
            border: 1px solid var(--border);
            background: rgba(255, 255, 255, 0.72);
            color: var(--text);
            text-decoration: none;
            font-weight: 700;
        }

        .card {
            padding: 34px;
            border: 1px solid var(--border);
            border-radius: 28px;
            background: var(--panel);
            box-shadow: 0 20px 60px rgba(31, 41, 55, 0.12);
            backdrop-filter: blur(14px);
        }

        h1 {
            margin: 0 0 10px;
            font-size: 30px;
        }

        .desc {
            margin: 0 0 24px;
            color: var(--muted);
            line-height: 1.6;
        }

        .info-list {
            display: grid;
            gap: 14px;
        }

        .info-item {
            padding: 16px 18px;
            border-radius: 18px;
            border: 1px solid rgba(24, 36, 45, 0.08);
            background: rgba(255, 255, 255, 0.68);
        }

        .label {
            display: block;
            margin-bottom: 6px;
            font-size: 13px;
            font-weight: 700;
            color: var(--muted);
        }

        .value {
            font-size: 16px;
            font-weight: 700;
            word-break: break-word;
        }
    </style>
</head>
<body>
<main class="page">
    <header class="topbar">
        <div class="brand">SEE-INSIGHT</div>
        <a class="link-button" th:href="@{/}">홈으로</a>
    </header>

    <section class="card">
        <h1>내 정보</h1>
        <p class="desc">현재 로그인한 회원 정보를 확인합니다.</p>

        <div class="info-list">
            <div class="info-item">
                <span class="label">이메일</span>
                <div class="value" th:text="${member.email}">email@example.com</div>
            </div>
            <div class="info-item">
                <span class="label">닉네임</span>
                <div class="value" th:text="${member.nickname != null ? member.nickname : '-'}">-</div>
            </div>
            <div class="info-item">
                <span class="label">멤버십</span>
                <div class="value" th:text="${member.membership}">NORMAL</div>
            </div>
            <div class="info-item">
                <span class="label">로그인 제공자</span>
                <div class="value" th:text="${member.provider}">google</div>
            </div>
            <div class="info-item">
                <span class="label">가입일</span>
                <div class="value" th:text="${#temporals.format(member.createdAt, 'yyyy-MM-dd HH:mm')}">2026-03-19 10:00</div>
            </div>
        </div>
    </section>
</main>
</body>
</html>

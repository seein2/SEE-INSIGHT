<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SEE-INSIGHT</title>
    <style>
        :root {
            color-scheme: light;
            --bg-start: #f4efe3;
            --bg-end: #d8e7ef;
            --panel: rgba(255, 255, 255, 0.88);
            --text: #18242d;
            --muted: #61707b;
            --border: rgba(24, 36, 45, 0.1);
            --ink: #20303b;
            --accent: #d96f32;
            --hero: rgba(255, 255, 255, 0.64);
        }

        * {
            box-sizing: border-box;
        }

        body {
            margin: 0;
            min-height: 100vh;
            font-family: "Pretendard", "Apple SD Gothic Neo", "Noto Sans KR", sans-serif;
            color: var(--text);
            background:
                radial-gradient(circle at top, rgba(255, 255, 255, 0.7), transparent 36%),
                linear-gradient(135deg, var(--bg-start), var(--bg-end));
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 24px;
        }

        .home-shell {
            width: min(920px, 100%);
        }

        .home-topbar {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 18px;
            padding: 0 4px;
        }

        .brand-mark {
            display: inline-flex;
            align-items: center;
            gap: 12px;
            font-size: 15px;
            font-weight: 800;
            letter-spacing: 0.08em;
            text-transform: uppercase;
            color: var(--ink);
        }

        .brand-mark::before {
            content: "";
            width: 14px;
            height: 14px;
            border-radius: 50%;
            background: linear-gradient(135deg, var(--accent), #f2bb67);
            box-shadow: 0 0 0 8px rgba(217, 111, 50, 0.08);
        }

        .top-button {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            min-height: 44px;
            padding: 0 18px;
            border-radius: 999px;
            border: 1px solid rgba(24, 36, 45, 0.12);
            background: rgba(255, 255, 255, 0.72);
            color: var(--ink);
            font-size: 14px;
            font-weight: 700;
            text-decoration: none;
            box-shadow: 0 8px 24px rgba(24, 36, 45, 0.08);
        }

        .top-actions {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .logout-form {
            margin: 0;
        }

        .top-button.logout {
            cursor: pointer;
            font-family: inherit;
        }

        .home-card {
            width: min(820px, 100%);
            padding: 54px 42px;
            border: 1px solid var(--border);
            border-radius: 28px;
            background: var(--panel);
            box-shadow: 0 20px 60px rgba(31, 41, 55, 0.12);
            backdrop-filter: blur(14px);
        }

        .hero {
            display: grid;
            gap: 24px;
            min-height: 420px;
            align-content: center;
            padding: 26px 0 12px;
        }

        .eyebrow {
            margin: 0;
            font-size: 12px;
            font-weight: 800;
            letter-spacing: 0.18em;
            color: var(--muted);
            text-transform: uppercase;
        }

        .hero-title {
            margin: 0;
            font-size: clamp(46px, 10vw, 110px);
            line-height: 0.94;
            letter-spacing: -0.05em;
            color: var(--ink);
        }

        .hero-copy {
            width: min(460px, 100%);
            margin: 0;
            padding: 18px 20px;
            border-radius: 20px;
            background: var(--hero);
            color: var(--muted);
            line-height: 1.7;
            border: 1px solid rgba(24, 36, 45, 0.08);
        }

        @media (max-width: 640px) {
            .home-topbar {
                flex-direction: column;
                align-items: flex-start;
                gap: 14px;
            }

            .home-card {
                padding: 34px 24px;
            }
        }
    </style>
</head>
<body>
<main class="home-shell">
    <header class="home-topbar">
        <div class="brand-mark">SEE-INSIGHT</div>
        <div class="top-actions">
            <a class="top-button" th:if="${!isAuthenticated}" th:href="${loginPageUrl}">로그인</a>
            <a class="top-button" th:if="${isAuthenticated}" th:href="${profileUrl}">내 정보</a>
            <form class="logout-form" th:if="${isAuthenticated}" th:action="@{/logout}" method="post">
                <button class="top-button logout" type="submit">로그아웃</button>
            </form>
        </div>
    </header>

    <section class="home-card">
        <section class="hero">
            <h1 class="hero-title">SEE-<br>INSIGHT</h1>
            <p class="hero-copy">
                관심 키워드 중심으로 뉴스 흐름을 정리하고, 더 빠르게 핵심 인사이트를 확인하세요!
            </p>
        </section>
    </section>
</main>
</body>
</html>

<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SEE-INSIGHT 로그인</title>
    <style>
        :root {
            color-scheme: light;
            --bg-start: #f4efe3;
            --bg-end: #d8e7ef;
            --panel: rgba(255, 255, 255, 0.88);
            --text: #18242d;
            --muted: #61707b;
            --border: rgba(24, 36, 45, 0.1);
            --google: #ffffff;
            --naver: #03c75a;
            --ink: #20303b;
            --accent: #d96f32;
        }

        * {
            box-sizing: border-box;
        }

        body {
            margin: 0;
            min-height: 100vh;
            font-family: "Pretendard", "Apple SD Gothic Neo", "Noto Sans KR", sans-serif;
            color: var(--text);
            background:
                radial-gradient(circle at top, rgba(255, 255, 255, 0.7), transparent 36%),
                linear-gradient(135deg, var(--bg-start), var(--bg-end));
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 24px;
        }

        .home-shell {
            width: min(920px, 100%);
        }

        .home-topbar {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 18px;
            padding: 0 4px;
        }

        .brand-mark {
            display: inline-flex;
            align-items: center;
            gap: 12px;
            font-size: 15px;
            font-weight: 800;
            letter-spacing: 0.08em;
            text-transform: uppercase;
            color: var(--ink);
        }

        .brand-mark::before {
            content: "";
            width: 14px;
            height: 14px;
            border-radius: 50%;
            background: linear-gradient(135deg, var(--accent), #f2bb67);
            box-shadow: 0 0 0 8px rgba(217, 111, 50, 0.08);
        }

        .top-button {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            min-height: 44px;
            padding: 0 18px;
            border-radius: 999px;
            border: 1px solid rgba(24, 36, 45, 0.12);
            background: rgba(255, 255, 255, 0.72);
            color: var(--ink);
            font-size: 14px;
            font-weight: 700;
            text-decoration: none;
            box-shadow: 0 8px 24px rgba(24, 36, 45, 0.08);
        }

        .home-card {
            width: min(520px, 100%);
            padding: 44px 34px;
            border: 1px solid var(--border);
            border-radius: 28px;
            background: var(--panel);
            box-shadow: 0 20px 60px rgba(31, 41, 55, 0.12);
            backdrop-filter: blur(14px);
        }

        .eyebrow {
            margin: 0 0 12px;
            font-size: 12px;
            font-weight: 700;
            letter-spacing: 0.16em;
            color: var(--muted);
        }

        h1 {
            margin: 0;
            font-size: 32px;
            line-height: 1.2;
        }

        p {
            margin: 14px 0 28px;
            line-height: 1.6;
            color: var(--muted);
        }

        .auth-actions {
            display: grid;
            gap: 12px;
        }

        .login-button {
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 56px;
            border-radius: 16px;
            font-size: 16px;
            font-weight: 700;
            text-decoration: none;
            transition: transform 0.18s ease, box-shadow 0.18s ease;
        }

        .login-button:hover {
            transform: translateY(-1px);
            box-shadow: 0 10px 24px rgba(31, 41, 55, 0.12);
        }

        .login-button.google {
            color: #202124;
            background: var(--google);
            border: 1px solid #dadce0;
        }

        .login-button.naver {
            color: #ffffff;
            background: var(--naver);
            border: 1px solid transparent;
        }

        .notice {
            margin-top: 18px;
            font-size: 13px;
            color: var(--muted);
        }

        .logged-in-box {
            margin-top: 10px;
            padding: 18px 18px;
            border: 1px solid rgba(24, 36, 45, 0.08);
            border-radius: 18px;
            background: rgba(255, 255, 255, 0.7);
            color: var(--muted);
            line-height: 1.6;
        }

        @media (max-width: 640px) {
            .home-topbar {
                flex-direction: column;
                align-items: flex-start;
                gap: 14px;
            }

            .home-card {
                padding: 34px 24px;
            }
        }
    </style>
</head>
<body>
<main class="home-shell">
    <header class="home-topbar">
        <div class="brand-mark">SEE-INSIGHT</div>
        <a class="top-button" th:if="${!isAuthenticated}" href="#login-section">로그인</a>
        <a class="top-button" th:if="${isAuthenticated}" th:href="${profileUrl}">내 정보</a>
    </header>

    <section class="home-card">
        <p class="eyebrow">SEE-INSIGHT</p>
        <h1 th:if="${!isAuthenticated}">소셜 로그인으로 시작하세요.</h1>
        <h1 th:if="${isAuthenticated}">뉴스 인사이트를 바로 확인하세요.</h1>
        <p th:if="${!isAuthenticated}">관심 키워드 기반 뉴스 요약과 구독 알림을 이용하려면 로그인하세요.</p>
        <p th:if="${isAuthenticated}">로그인이 완료되었습니다. 상단의 내 정보 버튼으로 현재 계정 정보를 확인할 수 있습니다.</p>

        <section id="login-section" class="auth-actions" th:if="${!isAuthenticated}">
            <a class="login-button google" th:href="${googleLoginUrl}">구글 로그인</a>
            <a class="login-button naver" th:href="${naverLoginUrl}">네이버 로그인</a>
        </section>

        <div class="logged-in-box" th:if="${isAuthenticated}">
            로그인 상태에서는 브라우저 쿠키의 JWT로 인증이 유지됩니다.
        </div>
    </section>
</main>
</body>
</html>

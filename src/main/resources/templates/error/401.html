<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>401 - 로그인이 필요합니다</title>
    <style>
        :root {
            color-scheme: light;
            --bg-start: #f4efe3;
            --bg-end: #d8e7ef;
            --panel: rgba(255, 255, 255, 0.88);
            --text: #18242d;
            --muted: #61707b;
            --border: rgba(24, 36, 45, 0.1);
            --ink: #20303b;
            --accent: #d96f32;
        }

        * {
            box-sizing: border-box;
        }

        body {
            margin: 0;
            min-height: 100vh;
            font-family: "Pretendard", "Apple SD Gothic Neo", "Noto Sans KR", sans-serif;
            color: var(--text);
            background:
                radial-gradient(circle at top, rgba(255, 255, 255, 0.7), transparent 36%),
                linear-gradient(135deg, var(--bg-start), var(--bg-end));
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 24px;
        }

        .page {
            width: min(460px, 100%);
        }

        .topbar {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 18px;
            padding: 0 4px;
        }

        .brand {
            display: inline-flex;
            align-items: center;
            gap: 12px;
            font-size: 15px;
            font-weight: 800;
            letter-spacing: 0.08em;
            text-transform: uppercase;
            color: var(--ink);
        }

        .brand::before {
            content: "";
            width: 14px;
            height: 14px;
            border-radius: 50%;
            background: linear-gradient(135deg, var(--accent), #f2bb67);
            box-shadow: 0 0 0 8px rgba(217, 111, 50, 0.08);
        }

        .card {
            padding: 40px 32px;
            border: 1px solid var(--border);
            border-radius: 28px;
            background: var(--panel);
            box-shadow: 0 20px 60px rgba(31, 41, 55, 0.12);
            backdrop-filter: blur(14px);
            text-align: center;
        }

        .icon {
            width: 80px;
            height: 80px;
            margin: 0 auto 24px;
        }

        .eyebrow {
            margin: 0 0 12px;
            font-size: 12px;
            font-weight: 800;
            letter-spacing: 0.16em;
            color: var(--muted);
            text-transform: uppercase;
        }

        h1 {
            margin: 0;
            font-size: 34px;
            line-height: 1.15;
        }

        p {
            margin: 14px 0 28px;
            line-height: 1.6;
            color: var(--muted);
        }

        .actions {
            display: grid;
            gap: 12px;
        }

        .button {
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 56px;
            border-radius: 16px;
            font-size: 16px;
            font-weight: 700;
            text-decoration: none;
            transition: transform 0.18s ease, box-shadow 0.18s ease;
        }

        .button:hover {
            transform: translateY(-1px);
            box-shadow: 0 10px 24px rgba(31, 41, 55, 0.12);
        }

        .button.primary {
            color: #ffffff;
            background: var(--accent);
            border: 1px solid transparent;
        }

        .button.secondary {
            color: var(--ink);
            background: rgba(255, 255, 255, 0.7);
            border: 1px solid var(--border);
        }
    </style>
</head>
<body>
<main class="page">
    <header class="topbar">
        <div class="brand">SEE-INSIGHT</div>
    </header>

    <section class="card">
        <svg class="icon" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
            <rect x="3" y="11" width="18" height="11" rx="2" stroke="var(--accent)" stroke-width="2"/>
            <path d="M7 11V7a5 5 0 0 1 10 0v4" stroke="var(--accent)" stroke-width="2" stroke-linecap="round"/>
            <circle cx="12" cy="16" r="1" fill="var(--accent)"/>
        </svg>

        <p class="eyebrow">Error 401</p>
        <h1>로그인이 필요합니다</h1>
        <p>이 페이지에 접근하려면 로그인이 필요합니다.</p>

        <section class="actions">
            <a class="button primary" href="/login">로그인하기</a>
            <a class="button secondary" href="/">홈으로 돌아가기</a>
        </section>
    </section>
</main>
</body>
</html>

<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>404 Not Found - SEE-INSIGHT</title>
    <style>
        :root {
            color-scheme: light;
            --bg-start: #f4efe3;
            --bg-end: #d8e7ef;
            --panel: rgba(255, 255, 255, 0.88);
            --text: #18242d;
            --muted: #61707b;
            --border: rgba(24, 36, 45, 0.1);
            --ink: #20303b;
            --accent: #d96f32;
        }

        * {
            box-sizing: border-box;
        }

        body {
            margin: 0;
            min-height: 100vh;
            font-family: "Pretendard", "Apple SD Gothic Neo", "Noto Sans KR", sans-serif;
            color: var(--text);
            background:
                radial-gradient(circle at top, rgba(255, 255, 255, 0.7), transparent 36%),
                linear-gradient(135deg, var(--bg-start), var(--bg-end));
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 24px;
        }

        .page {
            width: min(440px, 100%);
            display: flex;
            flex-direction: column;
            gap: 24px;
        }

        .topbar {
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 0 4px;
            margin-bottom: 8px;
        }

        .brand {
            font-size: 16px;
            font-weight: 800;
            letter-spacing: -0.02em;
            color: var(--ink);
        }

        .card {
            padding: 48px 32px;
            border: 1px solid var(--border);
            border-radius: 28px;
            background: var(--panel);
            box-shadow: 0 20px 60px rgba(31, 41, 55, 0.12);
            backdrop-filter: blur(14px);
            text-align: center;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .icon-container {
            width: 64px;
            height: 64px;
            margin-bottom: 24px;
            color: var(--accent);
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 16px;
            background: rgba(217, 111, 50, 0.12);
        }

        .icon-container svg {
            width: 32px;
            height: 32px;
        }

        .error-code {
            margin: 0;
            font-size: 48px;
            font-weight: 800;
            line-height: 1;
            color: var(--ink);
            letter-spacing: -0.04em;
        }

        h1 {
            margin: 16px 0 12px;
            font-size: 22px;
            font-weight: 700;
            line-height: 1.3;
            color: var(--text);
            letter-spacing: -0.02em;
        }

        p {
            margin: 0 0 32px;
            font-size: 15px;
            line-height: 1.6;
            color: var(--muted);
        }

        .home-button {
            display: flex;
            align-items: center;
            justify-content: center;
            width: 100%;
            min-height: 52px;
            border-radius: 14px;
            font-size: 16px;
            font-weight: 700;
            text-decoration: none;
            color: #ffffff;
            background: var(--ink);
            transition: transform 0.18s ease, box-shadow 0.18s ease;
        }

        .home-button:hover {
            transform: translateY(-1px);
            box-shadow: 0 10px 24px rgba(31, 41, 55, 0.12);
        }
    </style>
</head>
<body>
<main class="page">
    <header class="topbar">
        <div class="brand">SEE-INSIGHT</div>
    </header>

    <section class="card">
        <div class="icon-container">
            <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <path d="m21.73 18-8-14a2 2 0 0 0-3.48 0l-8 14A2 2 0 0 0 4 21h16a2 2 0 0 0 1.73-3Z"></path>
                <line x1="12" y1="9" x2="12" y2="13"></line>
                <line x1="12" y1="17" x2="12.01" y2="17"></line>
            </svg>
        </div>
        <h2 class="error-code">404</h2>
        <h1>페이지를 찾을 수 없습니다</h1>
        <p>요청하신 페이지가 사라졌거나<br>잘못된 경로를 입력하셨습니다.</p>
        <a class="home-button" href="/">홈으로 돌아가기</a>
    </section>
</main>
</body>
</html>

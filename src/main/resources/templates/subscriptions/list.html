<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>키워드 관리</title>
    <style>
        :root {
            color-scheme: light;
            --bg-start: #f4efe3;
            --bg-end: #d8e7ef;
            --panel: rgba(255, 255, 255, 0.88);
            --text: #18242d;
            --muted: #61707b;
            --border: rgba(24, 36, 45, 0.1);
            --ink: #20303b;
            --accent: #d96f32;
            --hero: rgba(255, 255, 255, 0.64);
        }

        * {
            box-sizing: border-box;
        }

        body {
            margin: 0;
            min-height: 100vh;
            font-family: "Pretendard", "Apple SD Gothic Neo", "Noto Sans KR", sans-serif;
            color: var(--text);
            background:
                radial-gradient(circle at top, rgba(255, 255, 255, 0.7), transparent 36%),
                linear-gradient(135deg, var(--bg-start), var(--bg-end));
            padding: 24px;
        }

        .page {
            width: min(760px, 100%);
            margin: 0 auto;
        }

        /* Topbar styles from profile.html */
        .topbar {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 22px;
        }

        .brand {
            display: inline-flex;
            align-items: center;
            gap: 12px;
            font-size: 15px;
            font-weight: 800;
            letter-spacing: 0.08em;
            text-transform: uppercase;
            color: var(--text);
            text-decoration: none;
        }

        .brand::before {
            content: "";
            width: 14px;
            height: 14px;
            border-radius: 50%;
            background: linear-gradient(135deg, var(--accent), #f2bb67);
            box-shadow: 0 0 0 8px rgba(217, 111, 50, 0.08);
        }

        .top-actions {
            display: flex;
            gap: 10px;
        }

        .link-button {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            min-height: 42px;
            padding: 0 18px;
            border-radius: 999px;
            border: 1px solid var(--border);
            background: rgba(255, 255, 255, 0.72);
            color: var(--text);
            text-decoration: none;
            font-weight: 700;
            transition: all 0.2s ease;
        }
        
        .link-button:hover {
            background: rgba(255, 255, 255, 0.9);
            transform: translateY(-1px);
        }

        /* Card styles from home.html */
        .content-card {
            padding: 34px;
            border: 1px solid var(--border);
            border-radius: 28px;
            background: var(--panel);
            box-shadow: 0 20px 60px rgba(31, 41, 55, 0.12);
            backdrop-filter: blur(14px);
        }

        .card-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 24px;
        }

        .card-header h2 {
            margin: 0;
            font-size: 24px;
            color: var(--ink);
            letter-spacing: -0.02em;
        }

        .add-popular-button {
            background: rgba(217, 111, 50, 0.1);
            color: var(--accent);
            border: 1px solid rgba(217, 111, 50, 0.2);
            border-radius: 999px;
            padding: 8px 16px;
            font-size: 14px;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.2s ease;
        }

        .add-popular-button:hover {
            background: rgba(217, 111, 50, 0.15);
            transform: translateY(-1px);
        }

        /* Input section */
        .add-section {
            display: flex;
            gap: 12px;
            margin-bottom: 32px;
        }

        .add-section input {
            flex: 1;
            padding: 14px 20px;
            border: 1px solid var(--border);
            border-radius: 14px;
            font-size: 16px;
            background: rgba(255, 255, 255, 0.68);
            outline: none;
            transition: border-color 0.2s ease;
        }

        .add-section input:focus {
            border-color: var(--accent);
        }

        .add-button {
            background: var(--accent);
            color: white;
            border: none;
            border-radius: 14px;
            padding: 0 24px;
            font-size: 16px;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.2s ease;
        }

        .add-button:hover {
            background: #c85a1f;
        }

        .error-message {
            display: none;
            margin: -18px 0 20px;
            color: #d94532;
            font-size: 14px;
            font-weight: 600;
        }

        .empty-state {
            padding: 28px 24px;
            border: 1px dashed rgba(24, 36, 45, 0.14);
            border-radius: 16px;
            background: rgba(255, 255, 255, 0.52);
            text-align: center;
            color: var(--muted);
            line-height: 1.7;
        }

        .is-hidden {
            display: none;
        }

        /* Subscription list */
        .subscription-list {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .subscription-item {
            display: flex;
            align-items: center;
            padding: 16px 20px;
            background: rgba(255, 255, 255, 0.68);
            border: 1px solid rgba(24, 36, 45, 0.08);
            border-radius: 16px;
            gap: 16px;
        }

        .keyword-name {
            flex: 1;
            font-size: 16px;
            font-weight: 700;
            color: var(--ink);
        }

        .time-select {
            padding: 8px 12px;
            border-radius: 8px;
            border: 1px solid var(--border);
            background: white;
            font-size: 14px;
            color: var(--text);
            outline: none;
        }

        .toggle-label {
            display: flex;
            align-items: center;
            gap: 6px;
            cursor: pointer;
            font-size: 14px;
            font-weight: 600;
            user-select: none;
        }

        .toggle-label input {
            width: 16px;
            height: 16px;
            accent-color: var(--accent);
        }

        .delete-button {
            background: rgba(24, 36, 45, 0.05);
            color: var(--muted);
            border: none;
            border-radius: 8px;
            padding: 8px 12px;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s ease;
        }

        .delete-button:hover {
            background: #ffebe5;
            color: #d94532;
        }

        .helper-text {
            margin: -14px 0 20px;
            color: var(--muted);
            font-size: 13px;
            line-height: 1.6;
        }

        /* Modal styles */
        dialog {
            padding: 0;
            border: none;
            border-radius: 24px;
            background: var(--panel);
            box-shadow: 0 24px 64px rgba(0, 0, 0, 0.2);
            backdrop-filter: blur(14px);
            width: min(480px, 90%);
            color: var(--text);
        }
        
        dialog::backdrop {
            background: rgba(0, 0, 0, 0.4);
            backdrop-filter: blur(4px);
        }

        .modal-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 24px;
            border-bottom: 1px solid var(--border);
        }

        .modal-header h3 {
            margin: 0;
            font-size: 20px;
            color: var(--ink);
        }

        .close-button {
            background: none;
            border: none;
            font-size: 24px;
            color: var(--muted);
            cursor: pointer;
            line-height: 1;
        }

        .modal-body {
            padding: 24px;
        }

        .popular-keywords-grid {
            display: flex;
            flex-wrap: wrap;
            gap: 12px;
        }

        .popular-keyword-button {
            background: rgba(255, 255, 255, 0.8);
            border: 1px solid var(--border);
            border-radius: 999px;
            padding: 10px 18px;
            font-size: 15px;
            font-weight: 600;
            color: var(--ink);
            cursor: pointer;
            transition: all 0.2s ease;
        }

        .popular-keyword-button:hover {
            border-color: var(--accent);
            color: var(--accent);
            background: rgba(217, 111, 50, 0.05);
            transform: translateY(-1px);
        }

        @media (max-width: 640px) {
            .subscription-item {
                flex-wrap: wrap;
            }
            .keyword-name {
                min-width: 100%;
                margin-bottom: 8px;
            }
            .add-section {
                flex-direction: column;
            }
        }
    </style>
</head>
<body>
    <main class="page">
        <header class="topbar">
            <a href="/" class="brand">SEE-INSIGHT</a>
            <div class="top-actions">
                <a class="link-button" href="/">홈</a>
                <a class="link-button" href="/me">내정보</a>
            </div>
        </header>
        
        <section class="content-card">
            <header class="card-header">
                <h2>📋 내 구독 키워드</h2>
                <button class="add-popular-button" onclick="openModal()">+ 인기에서 추가</button>
            </header>
            
            <div class="add-section">
                <input id="keywordInput" type="text" placeholder="새 키워드 입력" maxlength="255">
                <button class="add-button" type="button" onclick="submitKeyword()">추가</button>
            </div>
            <div id="errorMessage" class="error-message"></div>
            <p class="helper-text">알림 시간은 1시간 단위로 설정됩니다.</p>
            
            <div id="subscriptionList" class="subscription-list">
                <div
                    id="emptyState"
                    class="empty-state"
                    th:classappend="${subscriptions == null or subscriptions.content.isEmpty()} ? '' : ' is-hidden'">
                    아직 구독한 키워드가 없습니다.<br>
                    원하는 키워드를 추가해서 뉴스 알림을 시작하세요.
                </div>

                <div
                    class="subscription-item"
                    th:each="subscription : ${subscriptions.content}"
                    th:attr="data-subscription-id=${subscription.subscriptionId},data-keyword=${subscription.keyword}">
                    <span class="keyword-name" th:text="${subscription.keyword}">AI</span>
                    <select
                        class="time-select"
                        th:attr="data-original-time=${subscription.notificationTime}">
                        <option th:value="${subscription.notificationTime}" th:text="${subscription.notificationTime}" selected>
                            09:00
                        </option>
                    </select>
                    <label class="toggle-label">
                        <input
                            class="toggle-input"
                            type="checkbox"
                            th:checked="${subscription.isActive}">
                        <span class="toggle-text" th:text="${subscription.isActive ? '🔔 ON' : '🔕 OFF'}">🔔 ON</span>
                    </label>
                    <button class="delete-button" type="button">삭제</button>
                </div>
            </div>
        </section>
        
        <dialog id="popularModal">
            <header class="modal-header">
                <h3>🔥 인기 키워드</h3>
                <button onclick="closeModal()" class="close-button">✕</button>
            </header>
            <div class="modal-body">
                <div class="popular-keywords-grid">
                    <button class="popular-keyword-button" type="button" onclick="addPopularKeyword('AI')">AI +</button>
                    <button class="popular-keyword-button" type="button" onclick="addPopularKeyword('반도체')">반도체 +</button>
                    <button class="popular-keyword-button" type="button" onclick="addPopularKeyword('경제')">경제 +</button>
                    <button class="popular-keyword-button" type="button" onclick="addPopularKeyword('부동산')">부동산 +</button>
                    <button class="popular-keyword-button" type="button" onclick="addPopularKeyword('주식')">주식 +</button>
                </div>
            </div>
        </dialog>
    </main>
    
    <script>
        const keywordInput = document.getElementById('keywordInput');
        const errorMessage = document.getElementById('errorMessage');
        const subscriptionList = document.getElementById('subscriptionList');
        const emptyState = document.getElementById('emptyState');

        function openModal() {
            document.getElementById('popularModal').showModal();
        }

        function closeModal() {
            document.getElementById('popularModal').close();
        }

        async function submitKeyword(keyword) {
            const targetKeyword = (keyword ?? keywordInput.value).trim();

            if (!targetKeyword) {
                showError('키워드를 입력해주세요.');
                return;
            }

            hideError();

            try {
                const response = await fetch('/api/v1/subscriptions', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    credentials: 'same-origin',
                    body: JSON.stringify({ keyword: targetKeyword })
                });

                if (!response.ok) {
                    const errorBody = await response.json().catch(() => null);
                    const message = errorBody?.message || errorBody?.data?.message || '키워드 등록에 실패했습니다.';
                    showError(message);
                    return;
                }

                window.location.reload();
            } catch (error) {
                showError('키워드 등록 중 오류가 발생했습니다.');
            }
        }

        function addPopularKeyword(keyword) {
            closeModal();
            submitKeyword(keyword);
        }

        function showError(message) {
            errorMessage.textContent = message;
            errorMessage.style.display = 'block';
        }

        function hideError() {
            errorMessage.textContent = '';
            errorMessage.style.display = 'none';
        }

        function formatHour(hour) {
            return `${String(hour).padStart(2, '0')}:00`;
        }

        function hydrateTimeOptions() {
            document.querySelectorAll('.time-select').forEach((select) => {
                const selectedTime = select.dataset.originalTime || '09:00';
                const options = Array.from({ length: 24 }, (_, hour) => {
                    const value = formatHour(hour);
                    const selected = value === selectedTime ? ' selected' : '';
                    return `<option value="${value}"${selected}>${value}</option>`;
                });

                select.innerHTML = options.join('');
                select.value = selectedTime;
            });
        }

        function getSubscriptionItem(target) {
            return target.closest('.subscription-item');
        }

        function getSubscriptionId(element) {
            return getSubscriptionItem(element)?.dataset.subscriptionId;
        }

        function updateToggleText(checkbox) {
            const toggleText = getSubscriptionItem(checkbox)?.querySelector('.toggle-text');
            if (!toggleText) {
                return;
            }

            toggleText.textContent = checkbox.checked ? '🔔 ON' : '🔕 OFF';
        }

        function toggleControls(item, disabled) {
            item?.querySelectorAll('select, input, button').forEach((element) => {
                element.disabled = disabled;
            });
        }

        async function parseErrorMessage(response, fallbackMessage) {
            const errorBody = await response.json().catch(() => null);
            return errorBody?.message || errorBody?.data?.message || fallbackMessage;
        }

        async function patchSubscription(subscriptionId, payload, fallbackMessage) {
            const response = await fetch(`/api/v1/subscriptions/${subscriptionId}`, {
                method: 'PATCH',
                headers: {
                    'Content-Type': 'application/json'
                },
                credentials: 'same-origin',
                body: JSON.stringify(payload)
            });

            if (!response.ok) {
                throw new Error(await parseErrorMessage(response, fallbackMessage));
            }

            return response.json().catch(() => null);
        }

        async function deleteSubscription(subscriptionId, fallbackMessage) {
            const response = await fetch(`/api/v1/subscriptions/${subscriptionId}`, {
                method: 'DELETE',
                credentials: 'same-origin'
            });

            if (!response.ok) {
                throw new Error(await parseErrorMessage(response, fallbackMessage));
            }
        }

        function syncEmptyState() {
            const items = subscriptionList?.querySelectorAll('.subscription-item').length ?? 0;
            emptyState?.classList.toggle('is-hidden', items > 0);
        }

        keywordInput?.addEventListener('keydown', (event) => {
            if (event.key === 'Enter') {
                event.preventDefault();
                submitKeyword();
            }
        });

        subscriptionList?.addEventListener('change', async (event) => {
            const target = event.target;

            if (target.matches('.time-select')) {
                const item = getSubscriptionItem(target);
                const subscriptionId = getSubscriptionId(target);
                const previousTime = target.dataset.originalTime || target.value;

                hideError();
                toggleControls(item, true);

                try {
                    await patchSubscription(
                        subscriptionId,
                        { notificationTime: target.value },
                        '알림 시간 변경에 실패했습니다.'
                    );
                    target.dataset.originalTime = target.value;
                } catch (error) {
                    target.value = previousTime;
                    showError(error.message);
                } finally {
                    toggleControls(item, false);
                }
            }

            if (target.matches('.toggle-input')) {
                const item = getSubscriptionItem(target);
                const subscriptionId = getSubscriptionId(target);
                const previousChecked = !target.checked;

                updateToggleText(target);
                hideError();
                toggleControls(item, true);

                try {
                    await patchSubscription(
                        subscriptionId,
                        { isActive: target.checked },
                        '알림 설정 변경에 실패했습니다.'
                    );
                    updateToggleText(target);
                } catch (error) {
                    target.checked = previousChecked;
                    updateToggleText(target);
                    showError(error.message);
                } finally {
                    toggleControls(item, false);
                }
            }
        });

        subscriptionList?.addEventListener('click', async (event) => {
            const target = event.target;

            if (!target.matches('.delete-button')) {
                return;
            }

            const item = getSubscriptionItem(target);
            const subscriptionId = getSubscriptionId(target);
            const keyword = item?.dataset.keyword || '이 키워드';

            if (!window.confirm(`${keyword} 구독을 삭제하시겠습니까?`)) {
                return;
            }

            hideError();
            toggleControls(item, true);

            try {
                await deleteSubscription(subscriptionId, '구독 삭제에 실패했습니다.');
                item?.remove();
                syncEmptyState();
            } catch (error) {
                toggleControls(item, false);
                showError(error.message);
            }
        });

        hydrateTimeOptions();
        syncEmptyState();
    </script>
</body>
</html>

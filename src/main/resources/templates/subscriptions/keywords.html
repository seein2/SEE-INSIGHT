<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>키워드 관리</title>
    <style>
        :root {
            color-scheme: light;
            --bg-start: #f4efe3;
            --bg-end: #d8e7ef;
            --panel: rgba(255, 255, 255, 0.88);
            --text: #18242d;
            --muted: #61707b;
            --border: rgba(24, 36, 45, 0.1);
            --ink: #20303b;
            --accent: #d96f32;
            --hero: rgba(255, 255, 255, 0.64);
        }

        * {
            box-sizing: border-box;
        }

        body {
            margin: 0;
            min-height: 100vh;
            font-family: "Pretendard", "Apple SD Gothic Neo", "Noto Sans KR", sans-serif;
            color: var(--text);
            background:
                radial-gradient(circle at top, rgba(255, 255, 255, 0.7), transparent 36%),
                linear-gradient(135deg, var(--bg-start), var(--bg-end));
            padding: 24px;
        }

        .page {
            width: min(760px, 100%);
            margin: 0 auto;
        }

        /* Topbar styles from profile.html */
        .topbar {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 22px;
        }

        .brand {
            display: inline-flex;
            align-items: center;
            gap: 12px;
            font-size: 15px;
            font-weight: 800;
            letter-spacing: 0.08em;
            text-transform: uppercase;
            color: var(--text);
            text-decoration: none;
        }

        .brand::before {
            content: "";
            width: 14px;
            height: 14px;
            border-radius: 50%;
            background: linear-gradient(135deg, var(--accent), #f2bb67);
            box-shadow: 0 0 0 8px rgba(217, 111, 50, 0.08);
        }

        .top-actions {
            display: flex;
            gap: 10px;
        }

        .link-button {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            min-height: 42px;
            padding: 0 18px;
            border-radius: 999px;
            border: 1px solid var(--border);
            background: rgba(255, 255, 255, 0.72);
            color: var(--text);
            text-decoration: none;
            font-weight: 700;
            transition: all 0.2s ease;
        }
        
        .link-button:hover {
            background: rgba(255, 255, 255, 0.9);
            transform: translateY(-1px);
        }

        /* Card styles from home.html */
        .content-card {
            padding: 34px;
            border: 1px solid var(--border);
            border-radius: 28px;
            background: var(--panel);
            box-shadow: 0 20px 60px rgba(31, 41, 55, 0.12);
            backdrop-filter: blur(14px);
        }

        .card-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 24px;
        }

        .card-header h2 {
            margin: 0;
            font-size: 24px;
            color: var(--ink);
            letter-spacing: -0.02em;
        }

        .add-popular-button {
            background: rgba(217, 111, 50, 0.1);
            color: var(--accent);
            border: 1px solid rgba(217, 111, 50, 0.2);
            border-radius: 999px;
            padding: 8px 16px;
            font-size: 14px;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.2s ease;
        }

        .add-popular-button:hover {
            background: rgba(217, 111, 50, 0.15);
            transform: translateY(-1px);
        }

        /* Input section */
        .add-section {
            display: flex;
            gap: 12px;
            margin-bottom: 32px;
        }

        .add-section input {
            flex: 1;
            padding: 14px 20px;
            border: 1px solid var(--border);
            border-radius: 14px;
            font-size: 16px;
            background: rgba(255, 255, 255, 0.68);
            outline: none;
            transition: border-color 0.2s ease;
        }

        .add-section input:focus {
            border-color: var(--accent);
        }

        .add-button {
            background: var(--accent);
            color: white;
            border: none;
            border-radius: 14px;
            padding: 0 24px;
            font-size: 16px;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.2s ease;
        }

        .add-button:hover {
            background: #c85a1f;
        }

        /* Subscription list */
        .subscription-list {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .subscription-item {
            display: flex;
            align-items: center;
            padding: 16px 20px;
            background: rgba(255, 255, 255, 0.68);
            border: 1px solid rgba(24, 36, 45, 0.08);
            border-radius: 16px;
            gap: 16px;
        }

        .keyword-name {
            flex: 1;
            font-size: 16px;
            font-weight: 700;
            color: var(--ink);
        }

        .time-select {
            padding: 8px 12px;
            border-radius: 8px;
            border: 1px solid var(--border);
            background: white;
            font-size: 14px;
            color: var(--text);
            outline: none;
        }

        .toggle-label {
            display: flex;
            align-items: center;
            gap: 6px;
            cursor: pointer;
            font-size: 14px;
            font-weight: 600;
            user-select: none;
        }

        .toggle-label input {
            width: 16px;
            height: 16px;
            accent-color: var(--accent);
        }

        .delete-button {
            background: rgba(24, 36, 45, 0.05);
            color: var(--muted);
            border: none;
            border-radius: 8px;
            padding: 8px 12px;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s ease;
        }

        .delete-button:hover {
            background: #ffebe5;
            color: #d94532;
        }

        /* Modal styles */
        dialog {
            padding: 0;
            border: none;
            border-radius: 24px;
            background: var(--panel);
            box-shadow: 0 24px 64px rgba(0, 0, 0, 0.2);
            backdrop-filter: blur(14px);
            width: min(480px, 90%);
            color: var(--text);
        }
        
        dialog::backdrop {
            background: rgba(0, 0, 0, 0.4);
            backdrop-filter: blur(4px);
        }

        .modal-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 24px;
            border-bottom: 1px solid var(--border);
        }

        .modal-header h3 {
            margin: 0;
            font-size: 20px;
            color: var(--ink);
        }

        .close-button {
            background: none;
            border: none;
            font-size: 24px;
            color: var(--muted);
            cursor: pointer;
            line-height: 1;
        }

        .modal-body {
            padding: 24px;
        }

        .popular-keywords-grid {
            display: flex;
            flex-wrap: wrap;
            gap: 12px;
        }

        .popular-keyword-button {
            background: rgba(255, 255, 255, 0.8);
            border: 1px solid var(--border);
            border-radius: 999px;
            padding: 10px 18px;
            font-size: 15px;
            font-weight: 600;
            color: var(--ink);
            cursor: pointer;
            transition: all 0.2s ease;
        }

        .popular-keyword-button:hover {
            border-color: var(--accent);
            color: var(--accent);
            background: rgba(217, 111, 50, 0.05);
            transform: translateY(-1px);
        }

        @media (max-width: 640px) {
            .subscription-item {
                flex-wrap: wrap;
            }
            .keyword-name {
                min-width: 100%;
                margin-bottom: 8px;
            }
            .add-section {
                flex-direction: column;
            }
        }
    </style>
</head>
<body>
    <main class="page">
        <header class="topbar">
            <a href="/" class="brand">SEE-INSIGHT</a>
            <div class="top-actions">
                <a class="link-button" href="/">홈</a>
                <a class="link-button" href="/me">내정보</a>
            </div>
        </header>
        
        <section class="content-card">
            <header class="card-header">
                <h2>📋 내 구독 키워드</h2>
                <button class="add-popular-button" onclick="openModal()">+ 인기에서 추가</button>
            </header>
            
            <div class="add-section">
                <input type="text" placeholder="새 키워드 입력">
                <button class="add-button">추가</button>
            </div>
            
            <div class="subscription-list">
                <div class="subscription-item">
                    <span class="keyword-name">AI</span>
                    <select class="time-select">
                        <option selected>09:00</option>
                        <option>18:00</option>
                    </select>
                    <label class="toggle-label">
                        <input type="checkbox" checked>
                        <span>🔔 ON</span>
                    </label>
                    <button class="delete-button">삭제</button>
                </div>

                <div class="subscription-item">
                    <span class="keyword-name">반도체</span>
                    <select class="time-select">
                        <option selected>09:00</option>
                        <option>18:00</option>
                    </select>
                    <label class="toggle-label">
                        <input type="checkbox">
                        <span>🔔 OFF</span>
                    </label>
                    <button class="delete-button">삭제</button>
                </div>

                <div class="subscription-item">
                    <span class="keyword-name">경제</span>
                    <select class="time-select">
                        <option>09:00</option>
                        <option selected>18:00</option>
                    </select>
                    <label class="toggle-label">
                        <input type="checkbox" checked>
                        <span>🔔 ON</span>
                    </label>
                    <button class="delete-button">삭제</button>
                </div>
            </div>
        </section>
        
        <dialog id="popularModal">
            <header class="modal-header">
                <h3>🔥 인기 키워드</h3>
                <button onclick="closeModal()" class="close-button">✕</button>
            </header>
            <div class="modal-body">
                <div class="popular-keywords-grid">
                    <button class="popular-keyword-button">AI +</button>
                    <button class="popular-keyword-button">반도체 +</button>
                    <button class="popular-keyword-button">경제 +</button>
                    <button class="popular-keyword-button">부동산 +</button>
                    <button class="popular-keyword-button">주식 +</button>
                </div>
            </div>
        </dialog>
    </main>
    
    <script>
        function openModal() {
            document.getElementById('popularModal').showModal();
        }
        function closeModal() {
            document.getElementById('popularModal').close();
        }
    </script>
</body>
</html>
